name: Semantic Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  release:
    name: Release to GitHub and PyPI
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipenv build python-semantic-release==7.34.6
          pipenv sync --dev

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create version commit and tag
        id: semrel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          semantic-release version

          AFTER_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ "$BEFORE_TAG" != "$AFTER_TAG" ] && [ -n "$AFTER_TAG" ]; then
            semantic-release changelog > CHANGELOG.md

            if ! git diff --quiet -- CHANGELOG.md; then
              git add CHANGELOG.md
              git commit --amend --no-edit
            fi

            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$AFTER_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push release commit and tag
        if: steps.semrel.outputs.released == 'true'
        run: |
          git push origin HEAD:master --follow-tags

      - name: Create GitHub release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.semrel.outputs.tag }}" \
            --generate-notes \
            --title "${{ steps.semrel.outputs.tag }}"

      - name: Build Python distributions
        if: steps.semrel.outputs.released == 'true'
        run: python -m build

      - name: Publish package distributions to PyPI
        if: steps.semrel.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true
