name: Semantic Release

on:
  push:
    branches:
      - master

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release to GitHub and PyPI
    runs-on: ubuntu-latest
    environment: pypi
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release version, changelog, build, and push
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BEFORE_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          uv run semantic-release version
          AFTER_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [ "$BEFORE_TAG" != "$AFTER_TAG" ] && [ -n "$AFTER_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "version=${AFTER_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$AFTER_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  docker-publish:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/docker_publish.yml
    with:
      ref: ${{ needs.release.outputs.tag }}
    secrets: inherit