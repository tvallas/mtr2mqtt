name: Docker Publish

on:
  workflow_call:
    inputs:
      ref:
        description: Released git ref or tag to publish from
        required: true
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  docker-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out released source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine image tags from pyproject.toml
        shell: bash
        run: |
          VERSION="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "MAJOR_MINOR=$MAJOR_MINOR" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          tags: |
            tvallas/mtr2mqtt:${{ env.VERSION }}
            tvallas/mtr2mqtt:${{ env.MAJOR_MINOR }}
            tvallas/mtr2mqtt:latest